name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  backend-ci-linux:
    name: Backend Build & Test (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler-grpc \
            libpqxx-dev

      - name: Backend verify via script
        run: |
          chmod +x scripts/full_verify.sh
          ./scripts/full_verify.sh \
            --backend-only \
            --build-dir build \
            --build-type "${{ env.BUILD_TYPE }}" \
            --generator Ninja

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux-build
          path: |
            build/bin/
            build/lib/

  backend-ci-windows:
    name: Backend Build & Test (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg dependencies
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe install grpc protobuf libpqxx sqlite3 --triplet x64-windows

      - name: Backend verify via script
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1 \
            -BuildDir build-vs2022 \
            -BuildType ${{ env.BUILD_TYPE }} \
            -ToolchainFile C:\vcpkg\scripts\buildsystems\vcpkg.cmake

  electron-ci:
    name: Electron Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend verify via script (Linux/macOS)
        if: matrix.os != 'windows-2022'
        run: |
          chmod +x scripts/full_verify.sh
          ./scripts/full_verify.sh --frontend-only

      - name: Frontend verify via script (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1 \
            -SkipConfigure \
            -SkipBuild \
            -SkipTests \
            -VerifyFrontend

  release-artifacts:
    name: Release Artifacts
    runs-on: ubuntu-22.04
    needs: [backend-ci-linux, backend-ci-windows, electron-ci]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-linux-build
          path: artifacts/backend-linux

      - name: Prepare release bundles
        run: |
          mkdir -p release
          tar -czf release/backend-linux.tar.gz -C artifacts/backend-linux .
          tar -czf release/electron-client-source.tar.gz -C electron-client .

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/backend-linux.tar.gz
            release/electron-client-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
