name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  backend-ci-linux:
    name: Backend Build & Test (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler-grpc \
            libpqxx-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel

      - name: Build test targets
        run: cmake --build build --target algorithm_tests strategy_tests --parallel

      - name: List registered tests
        run: ctest --test-dir build -N

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux-build
          path: |
            build/bin/
            build/lib/

  backend-ci-windows:
    name: Backend Build & Test (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg dependencies
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe install grpc protobuf libpqxx sqlite3 --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-vs2022 -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        shell: pwsh
        run: cmake --build build-vs2022 --config Release --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build-vs2022 -C Release --output-on-failure

  electron-ci:
    name: Electron Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: electron-client
        run: npm install

      - name: Verify frontend scripts
        working-directory: electron-client
        run: npm run verify

  release-artifacts:
    name: Release Artifacts
    runs-on: ubuntu-22.04
    needs: [backend-ci-linux, backend-ci-windows, electron-ci]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-linux-build
          path: artifacts/backend-linux

      - name: Prepare release bundles
        run: |
          mkdir -p release
          tar -czf release/backend-linux.tar.gz -C artifacts/backend-linux .
          tar -czf release/electron-client-source.tar.gz -C electron-client .

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/backend-linux.tar.gz
            release/electron-client-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
